<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novo usuario | Estacionamento</title>
  </head>
  <body class="bg-yellow-100 min-h-screen flex items-center justify-center px-4">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
      <div class="text-center mb-8">
        <span class="text-5xl">+</span>
        <h1 class="text-2xl font-bold text-slate-800 mt-4">Cadastrar Usuario</h1>
        <p class="text-blue-600">Crie uma conta para acessar o sistema</p>
      </div>

      <form id="signup-form" class="space-y-4">
        <div>
          <label class="label-form" for="email">E-mail</label>
          <input
            type="email"
            id="email"
            required
            class="w-full mt-1 p-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none"
            autofocus
          />
        </div>

        <div>
          <label class="label-form" for="password">Senha</label>
          <input
            type="password"
            id="password"
            required
            minlength="6"
            class="w-full mt-1 p-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none"
          />
        </div>

        <div>
          <label class="label-form" for="confirm-password">Confirmar senha</label>
          <input
            type="password"
            id="confirm-password"
            required
            minlength="6"
            class="w-full mt-1 p-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none"
          />
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-md">
          Cadastrar usuario
        </button>
      </form>

      <div id="message" class="mt-4 text-center text-sm hidden"></div>

      <p class="mt-6 text-center text-sm text-slate-600">
        Ja tem conta?
        <a href="./index.html" class="font-semibold text-blue-600 hover:text-blue-700">Entrar</a>
      </p>
    </div>

    <script type="module" src="/src/novo.js"></script>
  </body>
</html>

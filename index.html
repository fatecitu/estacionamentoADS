<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estacionamento</title>
  </head>
  <body class="bg-yellow-100 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
      <div class="text-center mb-8">
        <span class="text-5xl">🔑</span>
        <h1 class="text-2xl font-bold text-slate-800 mt-4">Controle de Acesso</h1>
        <p class="text-blue-600">Entre com as suas credenciais</p>
      </div>
      <form id="login-form">
        <div> <!-- email -->
        <label class="block text-sm font-medium text-slate-700">E-mail</label>
        <input type="email" id="email" required class="w-full mt-1 p-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none" autofocus>
        </div>
        <div><!-- senha -->
<label class="label-form">Senha</label>
<input type="password" id="password" required
class="w-full mt-1 p-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-md mt-4">Acessar o sistema</button>
      </form>
      <!-- mensagem -->
      <div id="message" class="mt-4 text-center text-sm text-red-500 hidden"></div>
    </div>
  
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
